    ["오버워치 2","Overwatch 2",30,2,"7월 시작된 2026 시즌 3에서 신속·치명적인 신규 공격 영웅 '시온'이 하시모토 일족을 이끌고 합류했다. 7월 1일부터 21일까지 진행되는 요아소비(YOASOBI) 콜라보와 '혼의 습격' 이벤트가 겹치며 복귀 유저가 늘고 있다.",["신규영웅","시온","시즌3"],"HnyJ5b7CXoo",{}],
    ["승리의 여신: 니케","NIKKE",200,3,"7월 2일 여름 기념 업데이트로 수영복 신규 니케 '신데렐라: 크리스탈 웨이브'와 '마르차나'가 등장하며 한국 앱스토어 매출 1위를 역주행 탈환했다. 풀보이스 스토리 'WAVE TO YOU'와 리듬게임 여름 테마곡, 더현대 팝업스토어 예고까지 겹치며 화제다.",["여름업데이트","매출1위","신규캐릭터"],"r4hY_o3xzlM",{}],
    ["리그 오브 레전드","League of Legends",210,5,"6월 28일 대전에서 개막한 2026 MSI가 7월 12일 결승을 향해 달아오르며 e스포츠 화제를 독점하고 있다. 페이커의 T1이 9년 만의 MSI 우승에 도전하고, LCK 팀들의 국제전 성적에 커뮤니티가 매일 들끓는다.",["MSI2026","T1","e스포츠"],"TEb9qRf7qJc",{}],
    ["검은사막 모바일","Black Desert Mobile",20,null,"펄어비스가 7월 11일 온라인으로 '2026 하이델 연회'를 개최하며 하반기 대규모 업데이트 로드맵을 공개한다. '붉은사막' 흥행으로 관심이 쏠린 펄어비스 IP의 후속 행보라는 점에서 유저들의 기대가 집중되고 있다.",["하이델연회","펄어비스","로드맵공개"],"Mchsgk6KwSY",{}],
    ["PUBG: 배틀그라운드","PUBG: BATTLEGROUNDS",40,-1,"2026 '블랙 마켓'이 돌아와 논란이던 '이중 가챠'를 없애고 하나의 화물에서 성장형 무기 스킨을 획득하는 방식으로 개편됐다. 토큰·화물권이 7월 중순까지 유효해 이번 주 유저들의 구매 열기가 이어지고 있다.",["블랙마켓","가챠개편","무기스킨"],"eHLM7ExUA8g",{}],

  subgame: {label:"🎴 서브컬쳐 게임", real:true, items:[
    ["명조: 워더링 웨이브","Wuthering Waves",200,3,"쿠로게임즈가 7월 10일 3.5 버전 '남겨진 울림, 검에 기대 꿈속에서 노래하리'를 예고하며 신규 지역 '몽주'와 신규 5성 캐릭터 공개로 아카라이브·디시가 달아올랐다. 사이버펑크 콜라보 여운이 채 가시기 전 현방 트레일러 'Eisodus'가 공개되며 이번 주 최고 화제작으로 부상했다.",["가챠 액션","신규버전","몽주"],"drCkxPZ4LLU",{}],

    ["승리의 여신: 니케","Goddess of Victory: Nikke",340,4,"7월 2일 시작된 여름 업데이트로 수영복 신규 니케 '신데렐라: 크리스탈 웨이브'가 등장하자 국내 앱스토어 매출 1위, 일본·대만 2위로 역주행에 성공했다. A-1 Pictures가 제작한 'OLD TALES' 스페셜 애니메이션과 풀보이스 스토리 'WAVE TO YOU'가 호평받으며 이번 주 화제성을 끌어올렸다.",["건 슈팅","여름 수영복","매출 역주행"],"CrK4mMa_sFU",{}],
    ["원신","Genshin Impact",45,1,"7월 1일 업데이트된 6.7 버전 '여름! 귀향? 폰티날리아 축제!'에서 우인단 집행관 제7위 '산드로네'가 5성 얼음 양손검 딜러로 합류했다. 신규 얼음·번개 반응 '별 초전도'와 폐쇄적 설계 논쟁이 겹치며 이번 주 커뮤니티에서 찬반이 갈렸다.",["오픈월드 RPG","산드로네","얼음 딜러"],"jvXGgbPQ8dQ",{}],
    ["젠레스 존 제로","Zenless Zone Zero",155,2,"3.0 버전 '꿈속을 헤매는 이의 고백'에서 정식 출시 이후 최초의 바람 속성 에이전트 '벨리나 아르기드'가 S급 메인 딜러로 등장하며 신규 원소·소용돌이 반응이 화제가 됐다. 공중 도시 로스카엘리페르 스토리 개막과 함께 2주년 시즌3 예고까지 겹쳐 이번 주 언급량이 급증했다.",["액션 RPG","벨리나","바람 속성"],"KHxJDElYRmM",{}],

    ["블루 아카이브","Blue Archive",210,0,"산해경 콘셉트의 신규 이벤트 '오욕내강'과 6차 메인 스토리 PV가 공개되며 스토리 전개와 신규 학생에 대한 기대감이 커졌다. 7월 22일 파키사키(수영복) 한정 픽업과 여름 리콜렉트 모집이 예고되며 이번 주 샬레 유저들의 저축 계획이 화제가 됐다.",["서브컬쳐 RPG","오욕내강","6차 스토리"],"cIKu_XHsi2g",{}],

  culture: {label:"🌸 서브컬쳐 문화", real:true, items:[
    ["무직전생 3기","Mushoku Tensei III",210,null,"이세계 판타지의 대표작 '무직전생' 3기가 7월 4일 1·2화 특별 연속 방영으로 포문을 연다. 스튜디오 바인드가 그리는 '에리스 수행편'의 새 티저 PV가 공개되며 이번 주 애니 팬덤 화제 1순위로 떠올랐다.",["애니","이세계","신작"],"4-UTuXoe5hI",{}],

    ["스텔라이브 아카네 리제","AKANE LIZE Solo Concert",350,null,"스텔라이브 2기 멤버 아카네 리제의 첫 단독 콘서트 'OVT'가 7월 11일 고려대 화정체육관에서 개최를 앞두고 예매 열기가 달아올랐다. 'OVERTONE·Over the Twilight'을 내건 무대 공식 트레일러가 이번 주 버튜버 커뮤니티를 뜨겁게 달구고 있다.",["버튜버","콘서트","스텔라이브"],"U2KOUVULzrQ",{}],
    ["플레이브","PLAVE",265,3,"버추얼 보이그룹 플레이브가 9월 인천을 시작으로 7개 도시를 도는 첫 월드투어 'KEEP IT MANIC' 개최를 확정하며 화제몰이 중이다. 빌보드 차트에 오른 대표곡 'BBUU!'의 인기와 함께 글로벌 팬덤 규모를 입증하고 있다.",["버튜버","월드투어","K팝"],"8L001YT4k6k",{}],
    ["체인소맨","Chainsaw Man",15,null,"후지모토 타츠키의 인기 만화 '체인소맨'이 6월 19일 스마트폰 게임화를 발표하며 팬덤이 들썩였다. 애니 제작사 MAPPA가 직접 만든 게임 오프닝 무비가 공개돼 원작 팬들의 기대감을 끌어올리고 있다.",["만화","게임화","MAPPA"],"79vTeZzLmcY",{}],
    ["극장판 암살교실 모두의 시간","Assassination Classroom: Everyone's Time",130,null,"명작 '암살교실' 방영 10주년 기념 완전 신작 극장판이 7월 1일 국내 개봉하며 옛 팬들을 극장으로 불러 모으고 있다. 살생님과 E반의 졸업을 앞둔 마지막 15일을 그린 신작 에피소드가 이번 주 개봉작 화제작으로 꼽힌다.",["극장판","애니","개봉"],"wsKuoJRBBIc",{}],
    ["유녀전기 2기","Saga of Tanya the Evil II",25,null,"9년 만에 돌아오는 밀리터리 판타지 '유녀전기' 2기가 7월 8일 방영을 앞두고 메인 PV 제2탄을 공개했다. 전작의 두터운 팬층과 오랜 공백기 덕에 이번 주 복귀작 중 가장 큰 주목을 받고 있다.",["애니","2기","판타지"],"kUvhvkPDvm0",{}],
    ["그랑블루 3기","Grand Blue Dreaming Season 3",195,null,"대학 다이빙 동아리 개그물의 대명사 '그랑블루' 3기가 7월 7일 방영을 시작하며 여름 시즌 웃음 담당으로 복귀했다. 술과 근육, 청춘 코미디의 진수를 담은 본 PV가 공개되며 시즌 개그 애니 기대작으로 자리매김했다.",["애니","3기","코미디"],"KJw6ZZaMOWA",{}],

    ["행돌","Haengdol",210,null,"선데이와 공동 주최하는 치지직 제작지원 발로란트 스트리머 대회 '2026 발락대'가 7월 6일 드래프트를 시작으로 이번 주 본격 개막하면서 주최자로 주목받았다. 대회는 7월 12일 결승까지 이어질 예정이다.",["발락대","발로란트","치지직"],"Z-xSnQ5eLis",{"plat": "치지직"}],
    ["선데이","Sunday",260,null,"행돌과 함께 '2026 발락대'를 공동 주최하며 이번 주 발로란트 스트리머 대회 흥행을 이끌었다. 라디언트 상위권 실력자로 대회 진행과 함께 본인 방송에서도 발로란트 하이라이트를 선보이며 화제를 이어갔다.",["발락대","발로란트","스트리머대회"],"C0CXqFAnyM8",{"plat": "치지직"}],
    ["한동숙","Handongsuk",345,2,"치지직 대표 스트리머 중 한 명으로, 이번 주 개막한 발로란트 스트리머 대회 시즌과 맞물려 과거 발로란트 대회 활약이 다시 회자됐다. 공식 채널 '동수칸TV'를 통해 게임 방송 다시보기를 꾸준히 공개하고 있다.",["한동숙","발로란트","치지직"],"ofc8tg0mffc",{"plat": "치지직"}],
    ["강지","Kangji",15,1,"6월 22일부터 7월 1일까지 진행된 대형 마인크래프트 합방 서버 '봉켓몬'에 참여해 이번 주까지 관련 클립이 화제를 모았다. 스텔라이브 소속 버추얼 스트리머들과의 합방 콘텐츠로도 꾸준히 언급되고 있다.",["강지","봉켓몬","치지직"],"buapqBq7RBo",{"plat": "치지직"}],
    ["풍월량","Pungwollyang",170,0,"공포·인디 게임 위주의 방송으로 꾸준한 시청자를 확보한 베테랑 스트리머로, 이번 주에도 신작 게임 실황 다시보기를 공식 채널에 공개했다. 침착맨 등 동료 스트리머와의 오프라인 합방으로도 언급됐다.",["풍월량","게임방송","SOOP"],"_lI0bM-g0sc",{"plat": "SOOP"}],
    ["우정잉","Woojeonging",320,1,"이번 주 침착맨 채널의 '단군 vs 우정잉' 대결 콘텐츠에 출연하며 화제를 모았고, 본인 채널에서도 '종겜동' 토크 콘텐츠를 이어갔다. 밝은 진행과 게임 실력으로 여성 스트리머 상위권을 유지하고 있다.",["우정잉","종겜동","합방"],"Yr5bh-qltl0",{"plat": "치지직"}],
    ["우왁굳","Woowakgood",45,0,"버추얼 아이돌 그룹 '이세계아이돌'의 총괄 프로듀서 겸 스트리머로, 이번 주 마인크래프트 합방 서버 '봉켓몬' 관련 소속 콘텐츠와 함께 꾸준히 언급됐다. 공식 채널에 다양한 예능형 콘텐츠를 공개하고 있다.",["우왁굳","이세계아이돌","치지직"],"2jdCiYZ96Ko",{"plat": "치지직"}],

  movie: {label:"🎬 영화", real:true, items:[
    ["토이 스토리 5","Toy Story 5",205,0,"개봉 18일째인 7월 4일 200만 관객을 돌파하며 3주 연속 주말 박스오피스 정상을 지켰다. 픽사 시리즈의 저력으로 올해 개봉작 흥행 TOP5에 진입, 역주행 흥행세가 이어지고 있다.",["픽사","박스오피스1위","200만돌파"],"xZmN1QPwE9s",{"score": 3.7, "scoreMax": 5, "src": "왓챠피디아(3.7/5, 3.3만명) · 참고 RT92%/메타73/관객95%", "verdict": "보통", "note": "애니 퀄과 향수 자극은 호평이라 관객 만족도는 시리즈 최고지만, 4편이 완벽한 완결이라 '사족'·시리즈 최약체 논란이 명확(평론·메타 모두 메인 시리즈 최저). 스크린타임 주제가 설교적이고 우디·버즈·제시 외 조연 존재감 제로라는 불호도 상당수."}],
    ["눈동자","Nundongja",268,2,"신민아의 1인 2역 도전으로 화제를 모은 서스펜스 스릴러가 CGV 에그지수 88%, 네이버 실관람객 평점 8.8점으로 입소문을 타며 박스오피스 2위를 유지했다. 할리우드 대작 '슈퍼걸'을 제치고 국내 영화 자존심을 지켰다는 평가다.",["신민아","스릴러","입소문역주행"],"Psx6qJawATY",{"score": 5, "scoreMax": 10, "src": "씨네21 전문가 평점(네이버 실관람 8.8·CGV에그 88%는 선택편향으로 참고만)", "verdict": "보통", "note": "신민아 1인2역 '눈동자 연기'만 만장일치 호평, 정작 영화는 히치콕 '싸이코' 반전을 통째로 베껴 뻔하고 시각상실 설정도 범인 지연용 장치로만 소비돼 '허술한 스릴러'라는 평론 다수—흥행은 되나 완성도는 혹평."}],
    ["군체","Gunche",12,-1,"연상호 감독의 감염 재난 스릴러가 누적 500만 관객을 넘기며 올해 최단기간 400만 돌파 기록을 세웠다. 제79회 칸영화제 미드나잇 스크리닝 초청작으로 150여 개국에 선판매되며 K-장르물의 위상을 다시 입증했다.",["연상호","500만돌파","칸초청"],"FJ7uhPAAno8",{"score": 3, "scoreMax": 5, "src": "왓챠피디아", "verdict": "보통", "note": "액션 스케일·전지현/구교환 연기·집단진화 좀비 설정은 호평이나 개연성 부족·신파·클리셰로 서사는 아쉽다는 호불호가 갈리는 평(왓챠 3.0/5.6만명, 씨네21 전문가 6.0·관객 5.2, RT 약 70%; CGV 골든에그 86~89%는 과대평가라 근거 제외)"}],
    ["마티 슈프림","Marty Supreme",42,null,"티모시 샬라메 주연, 조쉬 사프디 감독의 A24 화제작이 7월 1일 개봉해 CGV 에그지수 91%의 호평을 받았다. '야망 폭발' 연기와 A24 특유의 스타일로 여름 극장가 마니아층의 관심을 집중시키고 있다.",["티모시샬라메","A24","개봉작"],"jE68v-bvetU",{"score": 3.6, "scoreMax": 5, "src": "왓챠피디아(3.6/5·1.4만명) / 참고: RT 93·Meta 89·IMDb 7.8·CinemaScore B+", "verdict": "보통", "note": "티모시 샬라메 연기는 만장일치 극찬이지만 주인공에 공감이 안 되고 호불호가 극명하게 갈린다는 평이 다수(평론=극찬, 관객=미지근)."}],
    ["극장판 도라에몽: 신 진구의 해저비밀성","Doraemon: Nobita's Undersea Palace",195,null,"여름방학 시즌을 겨냥한 도라에몽 극장판이 7월 1일 롯데시네마 단독 개봉했다. 시리즈 사상 최초로 MX4D 포맷 동시 상영을 확정하며 가족 관객 예매를 끌어모으고 있다.",["도라에몽","가족애니","MX4D최초"],"6tDZ1KZ4hmg",{"score": 2.8, "scoreMax": 5, "src": "왓챠피디아(285명)", "verdict": "보통", "note": "일본 현지는 호평(Filmarks 3.7/5·6946명)이나 한국 관객은 미지근~부정적(왓챠 2.8/5)—후반부 급전개와 원작의 긴장감·공포 연출이 순화돼 개연성이 떨어진다는 불만이 한일 공통 다수"}],
    ["그린랜드 2: 마이그레이션","Greenland 2: Migration",150,null,"제라드 버틀러·모레나 바카린 주연의 재난 블록버스터 속편이 7월 1일 국내 개봉했다. 혜성 충돌 5년 후 지하 벙커 생존기를 그리며 '촬영 중 실제로 땅이 갈라졌다'는 역대급 현장 비하인드로 화제를 모았다.",["제라드버틀러","재난블록버스터","속편"],"6zOmVSD4ao4",{"score": 2.4, "scoreMax": 5, "src": "왓챠피디아", "verdict": "비추", "note": "왓챠피디아 2.4/5(763명)·RT평론 48%·메타 49·IMDb 5.2로 전방위 저조, \"굳이 만든 사족 속편, 각본 허술·버틀러도 지쳐 보임, 볼거리는 영상미뿐\"이 다수 컨센서스"}],
    ["다윗","David",38,null,"박보검이 데뷔 후 처음으로 애니메이션 목소리 연기에 도전한 성경 애니메이션이 7월 15일 개봉을 앞두고 예매를 시작했다. 북미 개봉 당시 8038만 달러로 '킹 오브 킹스'를 넘어선 역대 종교 애니메이션 최고 오프닝 기록으로 관심을 끈다.",["박보검","종교애니","개봉임박"],"oIpFAruIVno",{"score": 6.9, "scoreMax": 10, "src": "IMDb (참고: 씨네21 관객 6.0/전문가 5.0, Metacritic 55, RT평론 ~80%/관객 98%)", "verdict": "보통", "note": "\"영상미는 극찬받지만 이야기는 뻔하고 설교조\"라는 평이 다수 — 관객 98%·시네마스코어A는 신앙층 자기선택 과대평가(왓챠 평점은 7월10일 국내개봉 직후라 사실상 없음, 씨네21 관객 6.0으로 미지근)"}],
    ["슈퍼걸","Supergirl",350,-3,"밀리 앨콕 주연의 DCU 두 번째 작품이 개봉 첫날 2위로 출발했으나 이틀 만에 4위로 추락하며 '한국서 힘 못 쓴다'는 흥행 부진 기사가 쏟아졌다. DC 히어로물의 국내 부진이 오히려 화제가 되고 있다.",["DC","밀리앨콕","흥행부진"],"GP3zVF6Wce0",{"score": 2.7, "scoreMax": 5, "src": "왓챠피디아 (4,599명)", "verdict": "비추", "note": "밀리 앨콕 연기만 호평, 엉성한 각본·매력 없는 빌런·단조로운 액션으로 전작 '슈퍼맨' 대비 퇴보한 범작이란 혹평이 다수(왓챠 2.7/RT비평 54%/메타 49/IMDb 6.1, 국내 흥행도 참패). RT 관객 76%는 볼 사람만 본 편향."}],

  drama: {label:"🎭 드라마", real:true, items:[
    ["김부장","Kim Bu-jang (Mr. Kim)",210,1,"소지섭 주연 SBS 금토극이 방송 4회 만에 전국 시청률 21.6%를 돌파하며 2년 만의 20%대 대박을 터뜨렸다. 넷플릭스 동시 공개로 플릭스패트롤 기준 20개국 1위에 오르며 국내외 화제성 정상을 굳혔다.",["SBS금토","소지섭","웹툰원작"],"yCvIqRRSzhY",{}],
    ["참교육","Teach You a Lesson",0,-1,"김무열 주연 넷플릭스 오리지널이 공개 7일차 45개국 1위로 전 세계 넷플릭스 비영어권 정상에 올랐고, 2주차 시청 2억 시간을 돌파했다. 교권 붕괴를 소재로 한 사이다 액션에 미국 포브스가 '올해 최고 드라마'라 극찬했다.",["넷플릭스","김무열","교권붕괴"],"LdezlX84py0",{}],
    ["동궁","The East Palace",275,null,"남주혁·노윤서·조승우 주연의 넷플릭스 궁중 오컬트 사극이 7월 17일 공개를 앞두고 최종 예고편을 풀며 기대감이 폭발했다. 조승우의 3년 만의 드라마 복귀작이자 아시아권 유일의 넷플릭스 글로벌 라인업으로 '킹덤 잇는다'는 반응이 쏟아진다.",["넷플릭스","조승우","오컬트사극"],"kF9fNYN00WQ",{}],
    ["결혼의 완성","The Completion of Marriage",340,null,"'흥행 보증수표' 남궁민이 첫 회부터 이혼 선언과 아내 납치 전개로 몰아친 KBS2 토일 스릴러가 7월 4일 첫방 4.4%로 출발해 2회 만에 6.4%로 수직 상승했다. 김부장 독주에 맞선 남궁민표 심리 스릴러로 주말극 판도를 흔들고 있다.",["KBS토일","남궁민","스릴러"],"k-bI5Jckqo8",{}],
    ["친애하는 X","Dear X",300,-2,"글로벌 108개국 1위를 휩쓴 티빙 역대 흥행작이 tvN 토일 편성으로 안방극장에 상륙, 김유정의 파격 싸이코패스 연기가 다시 화제몰이 중이다. TV 시청률은 1%대로 낮지만 김유정은 통합 출연자 화제성 상위권을 지키고 있다.",["티빙","김유정","파멸멜로"],"akansp381_s",{}],
    ["오싹한 연애","Spooky in Love",160,null,"박은빈·양세종 주연 tvN 오컬트 로맨스가 7월 18일 첫방을 앞두고 '연애의 시작' '맞닿은 손' 티저를 연달아 공개하며 혐관 케미 기대감을 끌어올렸다. 귀신 보는 재벌 상속녀와 귀신 무서워하는 검사의 조합이 화제다.",["tvN토일","박은빈","오컬트로맨스"],"4noXqPC0OMU",{}],
    ["가족관계증명서","Family Register",25,null,"박세영·한고은·임지은이 얽힌 MBC 새 일일극이 7월 6일 첫 방송되며 '우아한 균열'을 예고한 파격 티저로 입소문을 탔다. 히든페이스 제작사 '보이드'가 합류한 120부작 막장극으로 저녁 시간대 화제를 정조준한다.",["MBC일일극","박세영","막장"],"uB4rjdEbzIU",{}],
    ["신입사원 강회장","The Chairman's New Employee",45,-3,"손현주·이준영 주연 JTBC 토일극이 7월 5일 최종회에서 영혼이 뒤바뀐 강회장의 정체와 전혜진 처단 작전을 공개하며 유종의 미를 거뒀다. 부진하던 JTBC 토일 라인업 중 초반 시청률 흐름이 가장 좋았던 리마인드 라이프물로 마무리 화제성을 모았다.",["JTBC토일","손현주","판타지"],"SzFCeayuMaY",{}],
  ]},
  music: {label:"🎵 음악", real:true, items:[

function ytThumb(id){return 'https://i.ytimg.com/vi/'+id+'/maxresdefault.jpg';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function grad(hue){return 'background:linear-gradient(135deg,hsl('+hue+' 55% 26%),hsl('+hue+' 60% 14%))';}
function catEmoji(){return CATS[state.cat].label.split(' ')[0];}

function enrich(it,i){
  var delta=it[3];
  var prev = delta===null ? null : (i+1)+delta;
  return {name:it[0],en:it[1],hue:it[2],delta:delta,prev:prev,desc:it[4],tags:it[5],video:it[6]||null,extra:it[7]||{},rank:i+1,rankStr:String(i+1).padStart(2,'0')};
}
function thumb(g,eager){
  if(g.video) return '<img src="'+ytThumb(g.video)+'" '+(eager?'fetchpriority="high"':'loading="lazy"')+' alt="" onerror="this.onerror=null;this.src=\'https://i.ytimg.com/vi/'+g.video+'/hqdefault.jpg\'">';
  return '<div class="grad" style="'+grad(g.hue)+'">'+catEmoji()+'</div>';
}
function rankMove(g,big){
  var sz=big?'':'';
  if(g.delta===null) return '<span class="rankmove newin">🆕 NEW<small>신규 진입</small></span>';
  if(g.delta>0) return '<span class="rankmove up">▲ '+g.delta+'<small>지난 '+g.prev+'위</small></span>';
  if(g.delta<0) return '<span class="rankmove down">▼ '+Math.abs(g.delta)+'<small>지난 '+g.prev+'위</small></span>';
  return '<span class="rankmove flat">— 유지<small>지난 '+g.prev+'위</small></span>';
}
function onclickAttr(g){return g.video?(' onclick="openVid(\''+g.video+'\')"'):'';}
function platBadge(p){if(!p)return '';var c={'치지직':'ch','SOOP':'soop','유튜브':'yt'}[p]||'etc';return '<span class="plat '+c+'">'+(p==='SOOP'?'숲':esc(p))+'</span>';}
function scoreBadge(x){if(!x||!x.score)return '';var v=x.verdict||'',vc={'추천':'rec','보통':'mid','비추':'bad','미정':'na'}[v]||'na';var disp=x.scoreMax===5?('★'+x.score):(x.scoreMax===10?(x.score+'/10'):(''+x.score));return '<span class="scoreb '+vc+'" title="'+esc(x.src||'')+'">'+disp+(v?' · '+esc(v):'')+'</span>';}

function shift(items){ // 일간/월간 느낌으로 살짝 섞기(데모)
  if(state.period==='weekly') return items;
  var a=items.slice(); if(state.period==='daily'){ if(a.length>2){a.splice(1,0,a.splice(2,1)[0]);} } else { if(a.length>3){a.push(a.splice(1,1)[0]);} }
  return a;
}

function renderLD(list){var el=document.getElementById("ld");if(!el)return;var items=list.map(function(g,i){return {"@type":"ListItem","position":i+1,"name":g.name,"description":g.desc};});el.textContent=JSON.stringify({"@context":"https://schema.org","@type":"ItemList","name":"ddeuzm HOT10 "+CATS[state.cat].label+" 화제성 랭킹","itemListElement":items});}
function render(){
  var raw = CATS[state.cat].items.map(enrich);
  var q=state.query.trim().toLowerCase(), has=q.length>0;
  var list = has ? raw.filter(function(g){return g.name.toLowerCase().includes(q)||g.en.toLowerCase().includes(q)||g.tags.some(function(t){return t.toLowerCase().includes(q);});}) : raw;
  var hero = has?null:raw[0];
  var rows = has?list:raw.slice(1);
  document.getElementById('hero').innerHTML = hero?renderHero(hero):'';
  document.getElementById('sampleNote').textContent = CATS[state.cat].real?'':'※ 샘플 데이터';
  document.getElementById('listTitle').textContent = has?'검색 결과':(CATS[state.cat].label+' · 이번 주 화제 TOP '+raw.length);
  document.getElementById('resultCount').textContent=(has?rows.length:raw.length)+'개';
  document.getElementById('clearBtn').style.display=has?'block':'none';
  var el=document.getElementById('list');
  el.innerHTML=(has&&rows.length===0)?'<div class="empty">검색 결과가 없어요.</div>':rows.map(renderRow).join('');
  renderLD(raw);
}
