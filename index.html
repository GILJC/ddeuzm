    ["스텔라이브 아카네 리제","AKANE LIZE Solo Concert",350,-4,"스텔라이브 2기 멤버 아카네 리제의 첫 단독 콘서트 'OVT'가 7월 11일 고려대 화정체육관에서 개최를 앞두고 예매 열기가 달아올랐다. 'OVERTONE·Over the Twilight'을 내건 무대 공식 트레일러가 이번 주 버튜버 커뮤니티를 뜨겁게 달구고 있다.",["버튜버","콘서트","스텔라이브"],"U2KOUVULzrQ",{}],

    ["코스피·반도체 폭락","KOSPI semiconductor plunge",210,null,"AI 반도체 랠리로 코스피가 8000선을 넘겼다가 삼성전자·SK하이닉스가 급락하며 코스피가 7,600대로 추락, 서킷브레이커·사이드카가 속출하고 '고점 신호냐'며 개미 투자자들이 패닉에 빠진 것이 이번주 재테크 최대 화제다.",["증시","재테크","반도체"],"crh10bX8rz0",{}],
    ["국가대표 감독 선임","Korea NT manager search",30,null,"월드컵 조별리그 탈락으로 홍명보 감독이 사퇴한 뒤 축구협회가 후임 선임에 착수, 벤투 재선임설과 정몽규 책임론이 겹치고 'K-축구혁신위' 출범까지 이어지며 남초 커뮤의 성토가 쏟아졌다.",["국가대표","축구협회","감독선임"],"-eVVAWm25T4",{}],
    ["홍명보 경질론 · 월드컵 남아공전 충격패","Hong Myung-bo Backlash · WC Loss to South Africa",0,-3,"한국이 2026 북중미 월드컵 조별리그 최약체 남아공에 0-1로 패해 32강 진출에 실패하면서, 홍명보 감독 즉각 경질을 요구하는 국민청원과 협회 책임론이 남초 커뮤니티 전반으로 확산됐다. 귀국길 공항 시위와 '역대 최악 경기력' 논쟁이 이번 주 스포츠 화제를 지배 중이다.",["월드컵","축구","홍명보"],"vu4QuvFfDyQ",{}],
    ["노르웨이 돌풍 · 홀란드 브라질 격침","Norway Shock · Haaland Sinks Brazil",210,-3,"엘링 홀란드가 멀티골로 우승 후보 브라질을 2-1로 꺾으며 노르웨이가 28년 만의 월드컵 본선에서 사상 첫 8강, 역대 최고 성적을 냈다. '괴물 홀란드'의 노 젓기 세리머니와 12일 잉글랜드(케인)와의 8강 빅뱅 매치가 커뮤니티 최대 화젯거리다.",["월드컵","홀란드","이변"],"nUkN-0eOi8g",{}],
    ["정보통신망법 개정 · 인터넷 검열 논란","Info-Comm Network Act · Online Censorship Row",275,-3,"7월 7일 시행된 개정 정보통신망법(허위조작정보 근절·불법촬영물 AI 필터링 확대)을 두고 디시·루리웹·펨코 등 대형 커뮤니티가 '입틀막법·인터넷 계엄령'이라며 강하게 반발, 국회 철회 청원이 14만 명을 넘겼다. 남초 커뮤니티가 직접 규제 대상이라 이번 주 체감 화제성이 극대화됐다.",["검열논란","정보통신망법","표현의자유"],"AiNmeyHFDZk",{}],
    ["메시 눈물의 역전승 · 아르헨 vs 이집트","Messi's Comeback Tears · Argentina vs Egypt",195,-3,"아르헨티나가 살라의 이집트에 끌려가다 후반 13분 만에 3골을 몰아쳐 3-2 대역전으로 8강에 올랐고, 메시가 감격의 눈물을 흘리는 장면이 오늘(8일) 새벽 커뮤니티를 강타했다. '라스트 댄스' 서사와 극장승 하이라이트가 실시간 화제.",["월드컵","메시","역전승"],"XS1PokW-i54",{}],
    ["호날두 눈물 · 스페인이 포르투갈 침몰","Ronaldo in Tears · Spain Knocks Out Portugal",45,-3,"이베리아 더비 16강에서 스페인이 후반 추가시간 극장골로 포르투갈을 꺾자, '마지막 월드컵'을 언급하며 무릎 꿇고 눈물 흘린 호날두 장면이 밈과 함께 커뮤니티에 대량 확산됐다. 세대교체 서사와 GOAT 논쟁이 다시 불붙었다.",["월드컵","호날두","스페인"],"Z-Mn9l1tUxo",{}],

    ["결혼의 완성","Completion of Marriage",250,-2,"남궁민이 7년 만에 KBS로 복귀한 토일 범죄 스릴러가 7월 4일 첫 방송했다. 이혼 직전 아내가 납치되는 설정과 2회 전국 6.4% 시청률로 방영 전부터 화제를 모으며 주말극 기대작으로 떠올랐다.",["드라마","남궁민","스릴러"],"FGk7UI4Or6k",{}],

    ["워크웨어","Workwear",30,0,"디키즈 셔츠·카고 등 실용성과 빈티지 무드를 살린 워크웨어가 2026 핵심 트렌드로 이어지고 있다. 고프코어와 테일러드의 중간 지점에서 여름용 크롭 셔츠·팀버랜드 매치 코디가 소개되는 중.",["워크웨어","디키즈","빈티지"],"DSS_DU5BxEA",{}],
    ["네오 프레피","Neo Preppy",145,0,"아가일 니트·폴로·럭비셔츠를 대담한 컬러와 매치하는 네오 프레피 룩이 여름 시즌으로 넘어오며 화제다. 반바지+셔츠 체형별 코디처럼 단정하면서 자유로운 무드가 20~30대 사이에서 언급된다.",["프레피룩","아가일","폴로"],"ks43N2SW5VI",{}],
    ["그라미치 카고 쇼츠","Gramicci Cargo Shorts",90,0,"기능성 아웃도어 무드의 그라미치 반바지가 여름 고프코어·캠핑룩 수요와 맞물려 다시 화제다. 다양한 핏과 컬러의 반바지 라인업을 비교하는 콘텐츠가 이번 주에도 조회되는 중.",["그라미치","카고쇼츠","고프코어"],"OruJkiDy4ns",{}],

  womenfashion: {label:"👗 여성 패션", real:true, items:[

    ["프렌치 걸 서머","French Girl Summer",190,0,"벨라 하디드의 남프랑스 휴양 룩을 계기로 빈티지·보헤미안·2000년대 무드를 섞은 '프렌치 걸 서머'가 올여름 스타일링 힌트로 급부상했다. 브라톱·크로셰·시어 카디건을 간결하게 조합하는 것이 특징이다.",["보헤미안","휴양지룩","꾸안꾸"],"90KZWpgfAbw",{}],
    ["포엣코어","Poet-core",260,0,"'시인'과 '코어'를 합친 서정적·지적 무드의 포엣코어가 2026 SS 트렌드로 확산되며 이번 주 관련 룩북·해설 영상이 쏟아졌다. 화이트 하이넥 셔츠·스카프·스퀘어 안경 같은 지적인 디테일이 핵심이다.",["지적무드","미니멀","SS트렌드"],"523SRsOZgWI",{}],
    ["피셔맨 샌들","Fisherman Sandals",35,0,"발등을 감싸고 앞코가 막힌 피셔맨 샌들이 올여름 신발 트렌드로 다양한 디자인으로 돌아왔다. 젤리·러버 소재로 가볍게 변주되며 꾸안꾸 데일리룩의 필수템으로 이번 주 코디 콘텐츠가 활발하다.",["샌들","여름신발","꾸안꾸"],"708iYVqxfKg",{}],
    ["카프리 팬츠","Capri Pants",15,0,"종아리 길이의 카프리 팬츠가 Y2K·레트로 감성과 프렌치 시크 무드를 타고 올여름 다시 떠올랐다. 크롭탑·발레플랫과 매치하는 코디가 핀터레스트·룩북에서 이번 주 확산되고 있다.",["카프리","Y2K","레트로"],"FRDB5rt71k8",{}],

    ["누가 돌아왔~게","Nuga Dorawatge (Who Came Back)",268,null,"유튜버 팔리아치의 '공주님의 안전귀가를 위해' 속 출소남 연기 대사 '감옥에서 누가 돌아왔~게'가, 이번 주 X(옛 트위터)에서 '이 밈 쓰지 말아주세요…' 패러디 카피파스타로 재확산되며 7월 대표 유행 밈으로 떠올랐다.",["팔리아치","X밈","패러디"],"EVymd_HtMtM",{"period":"2026.07 유행"}],
    ["야르숑 (야르송)","Yareu-syong (Yarsong)",200,null,"유튜브 채널 '유괴된돌고래'의 중독성 강한 곡 '야르숑'이 수능금지곡으로 불리며, 이번 주 DAY6 영케이 등의 커버와 알람 설정 밈으로 번져 화제를 모으고 있다.",["수능금지곡","유괴된돌고래","커버"],"DaApjwBlArY",{"period":"2026.07 유행"}],
    ["코 때리고 미안해하는 챌린지","Scuba (Ko-ttaerigi) Challenge",28,null,"크리에이터 h5wk의 'Scuba Juke' 안무에서 나온 '코 때리고 미안해하는 챌린지'가, 옆 사람 코를 툭 친 뒤 미안해하다 춤으로 넘어가는 반전 포맷으로 이번 주 국내 릴스·틱톡 피드를 장악하며 투어스·리센느 등 아이돌들도 잇달아 참여하고 있다.",["챌린지","스쿠버","릴스"],"YtHH50zdclQ",{"period":"2026.07 유행"}],
    ["배우 도전 N일차","Baeu Dojeon (Acting Challenge)",338,null,"'집이 불타서 없어진 상황'을 진지하게 연기하는 인스타발 '배우 도전 N일차' 밈이, 이번 주 아일릿(ILLIT)이 공식 유튜브에 '연기 도전 1일차'로 참여하면서 더 크게 번지고 있다.",["연기챌린지","ILLIT","인스타밈"],"P1nx9MTCVrg",{"period":"2026.07 유행"}],
    ["스핔이","Speaki",300,-4,"트릭컬 리바이브의 조연 '스피키'를 병맛 2차창작한 밈으로, 팬이 만든 '스피키 네르지 마세요'(더빙 오류로 '누르지'가 '네르지'로 들림) 영상이 원조다. 2025년 말 '가랑눈' 합성 영상이 한국·일본 유튜브 하이프와 니코니코동화 1위를 석권하며 한일 양쪽에서 역수출식으로 폭발, 2026년 상반기 서브컬처 밈 최대 화제작이 됐다.",["트릭컬","서브컬처","한일역수출"],"JUu56K-s3aQ",{"period":"2025.말~ 진행중"}],
    ["거제 야호","Geoje Yaho",330,-4,"걸그룹 리센느 일본인 멤버 미나미가 갸루 분장으로 멤버 원이(거제 출신)에게 일본어를 알려주다 \"거제 야~호~!\"(일본식 인사 やっほー)를 외친 데서 나온 밈이다. 무맥락의 하이텐션 갸루 감성이 숏폼에서 폭발해 2026 상반기 최대 밈으로 커졌고, 거제시가 멤버 전원을 홍보대사로 위촉하는 등 7월까지 화제가 이어지고 있다.",["숏폼","K팝","갸루"],"n2RaEd7Qitc",{"period":"2026 상반기~ 진행중"}],
    ["국기무스메","Gukgi Musume",345,-4,"국가를 미소녀로 의인화한 창작물이 모여 형성된 밈으로, 한국·중국·일본을 그린 '한중일쨩'이 시발점이다. 서로 티격태격하다가도 뭉치는 자매/친구 관계 묘사가 재미 요소로, 2026년 7월 트위터를 중심으로 급속히 확산되기 시작한 신상 밈이다.",["의인화","트위터","신상"],"AfIhQNTkRvM",{"period":"2026.07~ 신상"}],
    ["파라파라나 춰야겠다","Parapara-na Chwoyagetda",300,-4,"미나미가 갸루 콘셉트로 뜬금없이 \"난 파라파라나 춰야겠다\"(파라파라=일본식 유로비트 레트로 클럽 댄스)라고 말한 장면에서 파생된 밈이다. 춤 자체보다 '할 게 없으니 그냥 파라파라나 춘다'는 상황 회피 문장이 \"손님 올 때까지 파라파라나 춰야겠다\" 식으로 무한 응용되며 6~7월 인스타 릴스·틱톡에서 급확산 중이다.",["숏폼","유행어","갸루"],"kuiRY7_LLqk",{"period":"2026.06~ 진행중"}],
  ]},

    ["네네네토와와 4주년","Nenene Towawa 4th Anniversary",280,null,"모모스즈 네네와 토코야미 토와의 콤비 '네네네토와와' 4주년 기념 방송(7월 9일)에서 커플룩과 깜짝 발표가 예고돼 홀로라이브 백합 팬들 사이에서 화제가 됐다.",["홀로라이브","네네네토와와","4주년"],"Dpie3k8IK9g",{}],

    ["린도 치하야 생일 3D 'Flat Out'","Rindo Chihaya Birthday 3D Live - Flat Out",22,null,"홀로라이브 DEV_IS 플로우글로우의 린도 치하야가 7월 8일 생일 3D 라이브 'Flat Out ~Summer Fes!~'을 개최하며 여름 페스 무대를 선보였다.",["홀로라이브","FLOWGLOW","3D라이브"],"-dqLfiQ5IHU",{}],
    ["니지산지 코시엔 2026","Nijisanji Koshien 2026",210,-5,"니지산지 여름 최대 기획 '고교야구' 육성 대회. 7월 4일 드래프트 회의가 3D로 생중계돼 감독 10명 중 8명이 첫 참가하는 역대급 새 얼굴 개편으로 화제. 본선은 8월 8~11일 3일간 진행 예정.",["니지산지","대회","드래프트"],"DV-50xBI3pU",{"period":"7/4 드래프트 라이브 후 화제 지속중"}],
    ["키즈나 아이 컵 2026","Kizuna AI Cup 2026 / AIParty2026",320,-5,"버추얼 유튜버 원조 키즈나 아이의 활동 10주년·생일(6/30) 기념 게임 대회. 사쿠라 미코, 모리 칼리오페, 히구치 카에데, 타치바나 히나노 등 총 등록자 1300만 넘는 10명이 어몽어스 3D·폴가이즈로 격돌해 컬래버 화제.",["키즈나아이","대회","10주년"],"GK4Uv5yy6IY",{"period":"6/30 개최 후 화제 지속중"}],
    ["카나에","Kanae",265,-4,"니지산지 인기 라이버 카나에의 두 번째 단독 라이브 '孤独 -solitude-'가 7월 31일 도쿄 국제포럼 홀A에서 개최 예정. 히구치 카에데·켄모치 토야 등 호화 게스트와 티저 영상 공개로 티켓 화제.",["니지산지","단독라이브","예고"],"YEFg727LD6o",{"period":"7/31 공연 앞두고 화제 상승중"}],

  wvt: {label:"🌎 서양 버추얼", real:true, items:[
    ["홀로라이브 EN 4th 콘서트 -Serendipity-","hololive English 4th Concert -Serendipity-",190,0,"7월 3~4일 미국 LA 슈라인 오디토리엄에서 홀로라이브 EN 전 세대(Myth·Promise·Advent·Justice)가 총출연한 네 번째 대형 콘서트가 열려, 전원이 부른 첫 그룹곡 'Serendipity'와 7개 특수 유닛 무대·JP/ID 게스트(베스티아 제타, 코보, 와타메, 미오) 크로스오버로 이번 주 국내외 서양 버추얼 팬덤 최대 화제.",["홀로EN","콘서트","LA공연"],"Df6etdLFqso",{}],
    ["아이언마우스","Ironmouse",320,0,"독립 버추얼로 활동 중인 아이언마우스가 6월 1일부터 한 달간 면역결핍재단(IDF) 자선 서바톤을 진행해 6월 27일 자신의 최고 기록을 넘는 동시구독 20만 5천 명대를 달성했다. 7월 4일 애니메 엑스포에서 CDawgVA와 합동 패널까지 열며 화제를 이어갔다.",["독립버추얼","서바톤","자선"],"K3q4UcjJenM",{"period":"6월 서바톤~7월 초 AX 패널로 화제"}],
    ["아이리스","IRyS",200,0,"홀로라이브 EN의 아이리스가 Serendipity 콘서트에서 솔로 무대로 존재감을 보인 데 이어, 'Echoes of Aincrad'(소드아트온라인 콘셉트) 데스게임 챌린지 특별 방송으로 화제를 모았다. 파워보컬 곡과 게임 콜라보를 오가는 행보가 주목받는다.",["홀로라이브EN","콜라보","보컬"],"x03-mhBVn70",{"period":"7월 콘서트·특별방송으로 화제"}],

    ["올리비아 로드리고 'the cure'","Olivia Rodrigo - the cure",210,null,"올리비아 로드리고가 3집 'You Seem Pretty Sad for a Girl So in Love' 발매와 함께 낸 'the cure' MV(수제 판지 병원 세트에서 상심의 해독제를 찾는 연출)가 여름 실연송으로 꾸준히 언급되고 있다.",["팝록","실연송","여름앨범"],"B402rKl4bUg",{"period":"여름 앨범곡"}],
    ["재니스 STFU","Drake - Janice STFU",265,-3,"드레이크의 신곡으로 빌보드 핫100 1위 데뷔, 남성 솔로 아티스트 역대 최다 1위곡 기록을 세우며 마이클 잭슨을 넘어섰다. 대화하듯 흐르는 랩과 곡 제목을 둘러싼 온라인 화제로 여름 최대 이슈곡.",["힙합","핫100 1위","화제"],"SD4yRDY9mek",{"period":"2026-06 발매·핫100 1위 데뷔"}],
    ["다이 다이","Shakira, Burna Boy - Dai Dai",20,-3,"2026 FIFA 월드컵(캐나다·멕시코·미국) 공식 주제곡으로, 샤키라와 버나 보이가 아프로비츠·댄스팝·레게톤을 섞었다. 6월 개막식 공연 이후 미국 외 글로벌 차트 1위를 이어가며 축구 열기와 함께 확산.",["월드컵 주제곡","글로벌차트","콜라보"],"fcnDmrtj6Sk",{"period":"2026-05 발매·글로벌 1위"}],

    ["헤이트 댓 아이 메이드 유 러브 미","Ariana Grande - hate that i made you love me",300,-3,"아리아나 그란데가 낮은 음역과 내면을 파고드는 가사로 성장과 세간의 시선을 담아낸 신곡. 절제된 분위기가 오히려 호평을 받으며 스포티파이 글로벌 주간 차트 상위권에 안착.",["팝","스트리밍","화제"],"82-jTNka3uc",{"period":"2026-06 발매·글로벌 차트인"}],
    ["아이 뉴 잇, 아이 뉴 유","Taylor Swift - I Knew It, I Knew You",45,-3,"픽사 '토이 스토리 5'를 위해 테일러 스위프트가 만든 곡으로 빌보드 핫100 1위로 데뷔했다. 사운드트랙 곡의 크로스오버 파급력을 다시 증명하며 개봉 시즌과 맞물려 화제.",["OST","핫100 1위","토이스토리5"],"hDU4GB1PTxc",{"period":"2026-06 발매·핫100 1위 데뷔"}],

    ["엔화 40년만 최저 162엔","Yen Hits 40-Year Low",145,null,"6월 말~7월 초 엔·달러 환율이 162엔을 뚫으며 1986년 이후 약 40년 만에 최저치를 기록, 일본 당국의 시장 개입 경계 속 한국 여행객엔 '엔테크' 화제가 됐다.",["엔저","환율","경제"],"NDeSX-wjJRQ",{}],
    ["센카쿠 中日 함정 대치","Senkaku China-Japan Standoff",350,null,"노구교사변 89주년인 7월 7일 함포를 단 중국 선박이 센카쿠(댜오위다오) 일본 영해에 진입해 약 7시간 대치, 중일 영유권 갈등이 재점화되며 동아시아 안보 뉴스로 주목됐다.",["센카쿠","중일갈등","영유권"],"UC8ae43Tzuc",{}],
    ["트모다치 컬렉션 두근두근 생활","Tomodachi Life: Living the Dream (トモダチコレクション わくわく生活)",45,-4,"13년 만에 나온 닌텐도 '트모다치 컬렉션' 신작이 4월 발매 후 스위치 e숍 1위를 계속 지키고 있다. Mii 캐릭터로 지인·연예인을 만들어 섬 생활을 시키는 특유의 기묘한 재미가 틱톡에서 다시 대유행하며 화제다.",["닌텐도","스위치","틱톡바이럴"],"egwWjZRtj1w",{"period":"2026년 4월 발매~장기 인기 지속"}],
    ["태풍 9호 오키나와 접근","Typhoon No. 9 approaching Okinawa (台風9号)",210,-4,"대형·강한 세력의 태풍 9호가 서진하며 7월 11일경 오키나와 사키시마 제도에 직격할 우려가 커졌다. 집을 부술 수준의 강풍과 높은 파도가 예보돼 기상청이 경계를 호소하는 등 실시간 최대 관심 뉴스다.",["태풍","오키나와","재해경계"],"iES6w2sQmfU",{}],
    ["오타니 통산 300호 홈런","Shohei Ohtani hits 300th career HR (大谷翔平 300号)",25,-4,"오타니 쇼헤이가 MLB 통산 300홈런을 달성하며 사상 최초 300홈런·100도루를 역대 5번째 빠른 속도로 세웠다. 일본 스폰서 기업들이 SNS에서 축하 게시물을 잇달아 올리며 국민적 화제가 됐다.",["오타니","MLB","다저스"],"AV32gOwJOnY",{}],

  usnews: {label:"🇺🇸 미국 뉴스", real:true, items:[

    ["미국 독립 250주년","America 250th Independence Day",222,null,"미국이 7월 4일 건국 250주년을 맞아 워싱턴 내셔널몰에서 트럼프 연설과 85만 발 규모의 역대급 불꽃놀이로 자축했으나, 트럼프 태스크포스의 기념행사 정치화 논란도 함께 일었다.",["독립250주년","트럼프연설","불꽃놀이"],"IyEPha0Oafs",{}],
    ["테일러 스위프트 x 트래비스 켈시 결혼","Taylor Swift & Travis Kelce Wedding",330,-4,"팝스타 테일러 스위프트와 NFL 스타 트래비스 켈시가 7월 3일 매디슨 스퀘어 가든에서 1000명 규모의 초호화 결혼식을 올렸다. 애덤 샌들러가 주례를 맡고 2600만 달러를 자선단체에 기부하는 등 A급 셀럽 총출동으로 전 세계 SNS를 도배했다.",["연예","결혼식","셀럽"],"1FCEeIprEWU",{"period":"7월 초 결혼식 직후 폭발적 화제"}],
    ["오디세이 (크리스토퍼 놀란)","The Odyssey",35,-3,"크리스토퍼 놀란이 호메로스의 서사시를 맷 데이먼·톰 홀랜드·젠데이아 등으로 영화화한 대작이 7월 17일 개봉을 앞두고 있다. IMAX 70mm 회차가 1년 전부터 매진되고 오프닝 8000만~1억 달러가 점쳐지며 여름 최대 화제작으로 꼽힌다.",["영화","놀란","블록버스터"],"Mzw2ttJD2qQ",{"period":"개봉 직전 예매·리액션으로 화제 급상승"}],
    ["방글라데시 (이안 맥코넬)","Bangladesh - Ian McConnell",145,-3,"이안 맥코넬의 49초짜리 부조리 중독송 '방글라데시'가 틱톡 립싱크·대체 밈 포맷으로 폭발하며 올여름 노래 후보로 떠올랐다. '왜 날 방글라데시에 안 데려가'로 시작해 소시지·복수 음료 등 말도 안 되는 요구로 치닫는 가사가 웃음 포인트다.",["밈","틱톡","음악"],"adojY1SI-70",{"period":"떴다·바이럴 정점 진행 중"}],

  globalmeme: {label:"🌍 해외 밈", real:true, items:[
    ["IShowSpeed 월드컵송 (Champions)","IShowSpeed - World Cup (Champions)",20,null,"2026 북중미 월드컵이 한창인 가운데, 세계적 스트리머 IShowSpeed(아이쇼스피드)가 직접 만든 응원가 'World Cup (Champions)'이 FIFA 공식 앨범에 채택되고 인트로에 '대한민국'까지 호명돼, 대회 기간 내내 틱톡·쇼츠에서 밈송처럼 퍼지며 국내 축구·스트리머 커뮤니티에서도 화제다.",["월드컵","아이쇼스피드","밈송"],"vrY1THC_NQE",{"period":"2026 여름 · 북중미 월드컵"}],
    ["두 비스트 굿 게눅 (넌 충분해)","Du Bist Gut Genug",330,-1,"독일 듀오 Blumengarten의 5월 곡 후렴 '너는 충분해(Du bist gut genug)'를 고음으로 부르는 클립이 6월 틱톡에서 폭발했다. 오토튠 섞인 과장된 창법과 '클리블랜드 주니어' 합성 짤로 편집되며 유럽·미국권 밈으로 번졌다.",["틱톡","독일밈","음악밈"],"ieRNY3zPF4k",{"period":"2026-06 떴다~현재 확산중"}],
    ["색소폰이 점점 커진다","The Saxophones Are Getting Louder",25,-1,"1991년 영화 '보이즈 앤 더 후드'에서 비극 직전 흐르는 색소폰 테마를 빌린 밈. 일상 속 상황이 나빠질 징조를 '색소폰이 커진다'로 예고하는 포맷으로, 결말을 이미 안다는 특유의 불길함이 공감을 얻으며 확산됐다.",["틱톡","영화밈","포맷밈"],"F83CyBmMVhA",{"period":"2026-03 떴다~현재 유행중"}],

        +(g.video?'<button onclick="openVid(\''+jsq(g.video)+'\')" style="'+watchBtn+'">▶ 시청</button>':'')+'</div></div>'
    +'</div>'
    +'<div class="movecol"><span style="'+g.move.style+'">'+esc(g.move.text)+'</span><div style="font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:1px;color:rgba(241,236,225,.34);margin-top:6px">'+esc(g.move.sub)+'</div></div>'
  +'</div></div>';
}
function resultsHtml(){
  var cat=CATS[state.cat], raw=cat.items.map(enrich);
  var q=state.query.trim().toLowerCase(), has=q.length>0;
  var filtered=has?raw.filter(function(g){return g.name.toLowerCase().indexOf(q)>=0||String(g.en).toLowerCase().indexOf(q)>=0||(g.tags||[]).some(function(t){return String(t).toLowerCase().indexOf(q)>=0;});}):raw;
  var hero=has?null:decorate(Object.assign({},raw[0]),true);
  if(hero)hero.eyebrow=stripEmoji(cat.label)+' · FEATURED';
  var rowsRaw=has?filtered:raw.slice(1);
  var listTitle=has?'검색 결과':(stripEmoji(cat.label)+' · 이번 주 화제 TOP '+raw.length);
  var showDN=(state.cat==='news');
  var dn=showDN?(stripEmoji(DATANOTE_BASE)+' · '+stripEmoji(EXCL.news||'')):'';
  var listHeader='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:0 0 18px"><div style="display:flex;align-items:baseline;gap:12px"><span style="width:5px;height:22px;border-radius:5px;background:'+A+';display:inline-block"></span><h3 style="font-size:19px;font-weight:700;letter-spacing:-.3px">'+esc(listTitle)+'</h3><span style="font-family:\'Space Mono\',monospace;font-size:11px;color:rgba(241,236,225,.4)">'+(has?filtered.length:raw.length)+'개</span></div><span style="font-family:\'Space Mono\',monospace;font-size:10.5px;letter-spacing:1px;color:rgba(241,236,225,.38)">지난 순위 대비 ▲▼ 변화</span></div>';
  var rows=rowsRaw.length?rowsRaw.map(function(g0){return rowHtml(decorate(Object.assign({},g0),false));}).join(''):(has?'<div style="padding:52px;text-align:center;color:rgba(241,236,225,.42);border:1px dashed rgba(241,236,225,.13);border-radius:16px">검색 결과가 없어요.</div>':'');
  return (showDN?'<div style="font-size:11.5px;color:rgba(241,236,225,.46);margin:-8px 0 20px;line-height:1.6;max-width:760px">'+dn+'</div>':'')
    +(hero?heroHtml(hero):'')
    +listHeader
    +'<div class="rows" style="display:flex;flex-direction:column;gap:10px">'+rows+'</div>';
}
function footerHtml(){
  return '<footer style="margin-top:44px;padding-top:22px;border-top:1px solid rgba(241,236,225,.08);text-align:center;font-family:\'Space Mono\',monospace;font-size:10.5px;letter-spacing:.5px;color:rgba(241,236,225,.32);line-height:1.9">ddeuzm · 이번 주 화제성 기반 랭킹 — 순위 변화는 직전 집계 대비<br>영상·썸네일은 원본 플랫폼 공식 임베드/링크(자체 저장 없음) · 갱신 주기는 주제마다 다름</footer>';
}
function renderLightbox(){
  var el=document.getElementById('ddz-lb');
  if(!state.videoId){el.innerHTML='';return;}
  el.innerHTML='<div onclick="closeVid()" style="position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:24px"><span onclick="closeVid()" style="position:absolute;top:16px;right:24px;color:#fff;font-size:30px;cursor:pointer;opacity:.85">✕</span><div onclick="event.stopPropagation()" style="width:100%;max-width:960px"><div style="position:relative;padding-top:56.25%"><iframe src="https://www.youtube.com/embed/'+state.videoId+'?autoplay=1&rel=0" title="영상" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:14px"></iframe></div></div></div>';
}
function render(){
  document.getElementById('app').innerHTML=headerHtml()+breakingHtml()
    +'<div style="height:1px;background:rgba(241,236,225,.09);margin-bottom:22px"></div>'
    +navHtml()+controlsHtml()
    +'<div id="ddz-results">'+resultsHtml()+'</div>'+footerHtml();
  renderLightbox();
}

/* ---- handlers (global) ---- */
function setCat(k){state.cat=k;state.query='';render();}
function gotoBrk(k){if(!k)return;if(ORDER.indexOf(k)>=MORESTART)state.moreOpen=true;state.cat=k;state.query='';render();}
function toggleMore(){state.moreOpen=!state.moreOpen;render();}
function onSearch(v){state.query=v;document.getElementById('ddz-results').innerHTML=resultsHtml();var c=document.getElementById('ddz-clear');if(c)c.style.display=(v&&v.trim())?'flex':'none';}
function clearSearch(){state.query='';var el=document.getElementById('ddz-search');if(el)el.value='';document.getElementById('ddz-results').innerHTML=resultsHtml();var c=document.getElementById('ddz-clear');if(c)c.style.display='none';}
function brkScroll(dir){var r=document.getElementById('ddz-brk');if(r)r.scrollBy({left:dir*Math.max(240,r.clientWidth*0.8),behavior:'smooth'});}
function openVid(id){if(id){state.videoId=id;renderLightbox();}}
function closeVid(){state.videoId=null;renderLightbox();}
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&state.videoId)closeVid();});

render();
</script>
</body>
</html>
