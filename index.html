<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>게임버즈 | 이번 주 화제 게임 랭킹 — 왜 떴는지 알려주는 순위</title>
<meta name="description" content="검색량·PC방 순위가 아니라 '왜 떴는지'를 알려주는 게임 화제 랭킹. 커뮤니티·유튜브·스트리머 언급을 매일 자동 집계.">
<style>
  :root{
    --bg:#0b0d12; --card:#151922; --card2:#1b202b; --line:#262c38;
    --text:#eef1f6; --muted:#9aa2 b0; --muted:#98a1b0; --dim:#5f6673;
    --hot:#ff5646; --up:#25d07a; --down:#ff6b6b; --accent:#6b93ff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:radial-gradient(1200px 600px at 50% -200px, #1a2130 0%, var(--bg) 60%); color:var(--text);
    font-family:'Pretendard','Malgun Gothic',system-ui,sans-serif; line-height:1.6; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px; margin:0 auto; padding:0 18px 70px;}

  /* HERO */
  .hero{padding:40px 4px 26px; text-align:center;}
  .kicker{display:inline-block; font-size:12px; letter-spacing:.14em; color:var(--accent);
    background:rgba(107,147,255,.12); border:1px solid rgba(107,147,255,.25); padding:5px 14px; border-radius:20px; margin-bottom:16px;}
  .hero h1{font-size:34px; font-weight:800; line-height:1.25; letter-spacing:-.02em;}
  .hero h1 span{background:linear-gradient(90deg,#ff7a5c,#ff4d6d); -webkit-background-clip:text; background-clip:text; color:transparent;}
  .hero p{margin-top:12px; font-size:15px; color:var(--muted);}
  .hero p b{color:var(--text);}
  .period{margin-top:16px; font-size:13px; color:var(--dim);}
  .live{color:var(--up);} .dot{display:inline-block; width:7px; height:7px; background:var(--up); border-radius:50%; margin-right:5px; animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* FEATURED #1 */
  .feature{position:relative; border-radius:20px; overflow:hidden; border:1px solid var(--line); margin-bottom:16px;
    display:flex; min-height:210px; background:var(--card); transition:transform .25s, box-shadow .25s;}
  .feature:hover{transform:translateY(-3px); box-shadow:0 18px 50px -20px rgba(255,90,70,.5);}
  .cover{width:230px; flex-shrink:0; position:relative; display:flex; align-items:center; justify-content:center;
    font-size:52px; color:#fff; font-weight:800;}
  .cover .cvlabel{position:absolute; bottom:12px; left:0; right:0; text-align:center; font-size:11px; font-weight:400; opacity:.75;}
  .feature .info{flex:1; padding:26px 26px;}
  .crown{font-size:12px; color:#ffcf5c; letter-spacing:.1em; margin-bottom:8px;}
  .feature h2{font-size:26px; font-weight:800; letter-spacing:-.01em;}
  .feature .why{margin-top:12px; font-size:15px; color:var(--muted);}
  .feature .why b{color:var(--text); font-weight:600;}

  /* LIST */
  .card{display:flex; gap:16px; align-items:center; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:14px 16px; margin-bottom:11px; transition:transform .2s, border-color .2s;}
  .card:hover{transform:translateX(4px); border-color:#38414f;}
  .rank{font-size:26px; font-weight:800; color:var(--dim); min-width:34px; text-align:center;}
  .thumb{width:64px; height:64px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:26px;}
  .body{flex:1; min-width:0;}
  .titrow{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px;}
  .name{font-size:17px; font-weight:700;}
  .heat{font-size:12px; background:rgba(255,86,70,.15); color:var(--hot); padding:2px 9px; border-radius:20px; font-weight:600;}
  .flag-up{font-size:12px; color:var(--up); font-weight:600;}
  .flag-down{font-size:12px; color:var(--down); font-weight:600;}
  .why{font-size:14px; color:var(--muted);}
  .why b{color:var(--text); font-weight:600;}
  .tags{margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;}
  .tag{font-size:12px; background:rgba(107,147,255,.13); color:#9ab6ff; padding:2px 9px; border-radius:20px;}
  .tag.g{background:rgba(37,208,122,.13); color:#7ee0ac;}
  .tag.p{background:rgba(180,120,255,.13); color:#c9a8ff;}

  .autobox{margin-top:22px; padding:16px 18px; background:var(--card2); border:1px solid var(--line);
    border-radius:14px; font-size:13px; color:var(--muted); display:flex; gap:12px; align-items:center;}
  .autobox b{color:var(--text);}
  footer{margin-top:30px; font-size:12px; color:var(--dim); text-align:center;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <span class="kicker">GAME BUZZ · 화제성 랭킹</span>
    <h1>이번 주 <span>화제</span> 게임<br>왜 떴는지까지 알려줌</h1>
    <p>검색량·PC방 순위 말고, <b>커뮤니티·유튜브·스트리머 언급</b>을 모아 화제도를 매김</p>
    <div class="period"><span class="live"><span class="dot"></span>LIVE</span> · 2026.06.30 ~ 07.06 · 매일 새벽 자동 갱신 · <i>마지막 갱신 07.06</i></div>
  </div>

  <div id="feature"></div>
  <div id="list"></div>

  <div class="autobox">
    <span style="font-size:22px;">🤖</span>
    <div>매일 새벽 AI가 커뮤니티·유튜브·검색 데이터를 모아 <b>순위 + 화제 이유 + 태그 + 게임 이미지</b>까지 자동 생성합니다. 사람 손 0.</div>
  </div>

  <footer>© 2026 게임버즈 · 데이터 출처: 커뮤니티·유튜브·스트리머·검색 화제도 집계</footer>
</div>

<script>
// ▼ 이 배열이 매일 AI 파이프라인이 자동으로 갈아끼우는 부분입니다. (color=커버 대체색, art=실제 이미지 URL 자리)
const DATA = [
  {rank:1, name:"발로란트", heat:98, flag:"up", flagText:"EWC 급등", color:"linear-gradient(135deg,#ff4655,#7f1d1d)", emoji:"🎯",
   why:"<b>e스포츠 월드컵(EWC) 2026 오늘(7/6) 파리 개막</b> · 발로란트 그룹스테이지(7/2~7)가 한창인데 치지직이 전 종목을 단독 생중계, 총상금 <b>7,500만 달러</b> 사상 최대 규모로 시청 트래픽 폭발.",
   tags:[["EWC2026","g"],["치지직단독",""],["그룹스테이지",""]]},
  {rank:2, name:"붉은사막", heat:93, flag:"up", flagText:"600만장·하우징", color:"linear-gradient(135deg,#dc2626,#7c2d12)", emoji:"🏜️",
   why:"펄어비스 국산 AAA가 <b>누적 600만 장 돌파</b>에 이어 <b>실외 하우징·용 탑승</b> 신규 콘텐츠까지 얹으며 서새봄 등 스트리머 방송 상위 재점화. 7월 CEDEC 개발기 강연도 예고.",
   tags:[["600만장","g"],["하우징업데이트",""],["스트리머",""]]},
  {rank:3, name:"PUBG 배틀그라운드", heat:88, flag:"up", flagText:"EWC 종목", color:"linear-gradient(135deg,#f2a900,#b45309)", emoji:"🔫",
   why:"EWC 2026 <b>24개 종목</b>에 배그·크파가 나란히 포함, 크래프톤 대표 종목으로 오늘 개막과 함께 치지직 한국어 독점중계 트래픽 급등.",
   tags:[["EWC2026","g"],["치지직독점",""]]},
  {rank:4, name:"던전앤파이터", heat:84, flag:"", flagText:"", color:"linear-gradient(135deg,#7c3aed,#3730a3)", emoji:"👊",
   why:"괴물쥐 등 스트리머 시청자 상위를 지키는 가운데, 7월 <b>'보급 작전'·'레미디아 여프료시카'</b> 이벤트와 18번째 신규 캐릭터 '제국기사' 로드맵으로 커뮤니티 화력 유지.",
   tags:[["7월이벤트",""],["신규캐릭",""]]},
  {rank:5, name:"마인크래프트", heat:80, flag:"up", flagText:"서버 열풍", color:"linear-gradient(135deg,#5fbf5f,#1f6b2e)", emoji:"⛏️",
   why:"치지직 64인 포켓몬 서버 '<b>봉켓몬</b>' 종료 후 하이라이트 클립이 재확산되고, SOOP 하드코어 '<b>놀이터</b>' 서버가 새 열풍을 이으며 스트리머 서버 콘텐츠 전성기.",
   tags:[["봉켓몬",""],["놀이터서버","p"]]},
];

const f = DATA[0];
document.getElementById("feature").innerHTML = `
  <div class="feature">
    <div class="cover" style="background:${f.color}">
      ${f.emoji}<div class="cvlabel">${f.name}</div>
    </div>
    <div class="info">
      <div class="crown">👑 이번 주 1위 · 화제도 ${f.heat}</div>
      <h2>${f.name}</h2>
      <div class="why">${f.why}</div>
      <div class="tags" style="margin-top:14px;">${f.tags.map(t=>`<span class="tag ${t[1]}">#${t[0]}</span>`).join("")}</div>
    </div>
  </div>`;

document.getElementById("list").innerHTML = DATA.slice(1).map(d => `
  <div class="card">
    <div class="rank">${d.rank}</div>
    <div class="thumb" style="background:${d.color}">${d.emoji}</div>
    <div class="body">
      <div class="titrow">
        <span class="name">${d.name}</span>
        <span class="heat">🔥 ${d.heat}</span>
        ${d.flag==="up" ? `<span class="flag-up">▲ ${d.flagText}</span>` : ""}
        ${d.flag==="down" ? `<span class="flag-down">▼ ${d.flagText}</span>` : ""}
      </div>
      <div class="why">${d.why}</div>
      <div class="tags">${d.tags.map(t=>`<span class="tag ${t[1]}">#${t[0]}</span>`).join("")}</div>
    </div>
  </div>
`).join("");
</script>
</body>
</html>
