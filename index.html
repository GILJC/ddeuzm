    ["워크웨어","Workwear",30,0,"디키즈 셔츠·카고 등 실용성과 빈티지 무드를 살린 워크웨어가 2026 핵심 트렌드로 이어지고 있다. 고프코어와 테일러드의 중간 지점에서 여름용 크롭 셔츠·팀버랜드 매치 코디가 소개되는 중.",["워크웨어","디키즈","빈티지"],"DSS_DU5BxEA",{}],

  womenfashion: {label:"👗 여성 패션", real:true, items:[

    +'<button id="ddz-clear" onclick="clearSearch()" style="position:absolute;right:9px;top:50%;transform:translateY(-50%);border:none;background:rgba(241,236,225,.1);color:rgba(241,236,225,.7);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:11px;display:'+(has?'flex':'none')+';align-items:center;justify-content:center">✕</button></div>'
    +'<div style="font-family:\'Space Mono\',monospace;font-size:11px;letter-spacing:.5px;color:rgba(241,236,225,.5);border:1px solid rgba(241,236,225,.1);padding:8px 14px;border-radius:999px">'+esc((CADENCE[state.cat]||'수시')+' 갱신 · 마지막 '+LASTDATE)+'</div>'
  +'</div>';
}
function heroHtml(h){
  return '<div style="margin-bottom:44px"><section style="display:flex;flex-wrap:wrap;gap:clamp(20px,3vw,36px);padding:clamp(18px,2.4vw,26px);border-radius:22px;border:1px solid rgba(241,236,225,.1);background:linear-gradient(150deg,'+hexRgba(A,.05)+',rgba(20,19,21,.55) 60%);animation:ddzfade .5s ease both">'
    +'<div onclick="'+(h.video?'openVid(\''+jsq(h.video)+'\')':'')+'" style="position:relative;flex:0 0 clamp(240px,38%,420px);min-width:240px;aspect-ratio:16/9;border-radius:15px;overflow:hidden;border:1px solid rgba(241,236,225,.12);cursor:'+(h.video?'pointer':'default')+';background:#000">'
      +(h.video?'<img src="'+ytThumb(h.video)+'" onerror="this.onerror=null;this.src=\'https://i.ytimg.com/vi/'+jsq(h.video)+'/hqdefault.jpg\'" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">':'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(241,236,225,.5);background:linear-gradient(135deg,hsl('+h.hue+' 40% 24%),hsl('+h.hue+' 45% 12%))">'+esc(catWord())+'</div>')
      +'<div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(7,7,9,.82))"></div>'
      +'<div style="position:absolute;top:14px;left:14px;font-family:\'Space Mono\',monospace;font-weight:700;font-size:10px;letter-spacing:2px;padding:5px 10px;border-radius:6px;background:rgba(11,11,12,.6);border:1px solid '+aBorder+';color:'+A+'">RANK 01</div>'
      +'<div style="position:absolute;bottom:-6px;left:14px;font-family:\'Bodoni Moda\',serif;font-style:italic;font-weight:900;font-size:clamp(58px,8vw,92px);line-height:.8;color:#fff;text-shadow:0 6px 30px rgba(0,0,0,.7)">01</div>'
      +(h.video?'<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:rgba(11,11,12,.5);border:2px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:17px;padding-left:3px">▶</div>':'')
    +'</div>'
    +'<div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:13px">'
      +'<div style="font-family:\'Space Mono\',monospace;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:'+A+'">'+esc(h.eyebrow)+'</div>'
      +'<h2 style="font-size:clamp(26px,3.4vw,40px);font-weight:800;letter-spacing:-.8px;line-height:1.05">'+esc(h.name)+'</h2>'
      +'<div style="font-family:\'Space Mono\',monospace;font-size:11.5px;letter-spacing:1px;color:rgba(241,236,225,.42)">'+esc(h.en)+'</div>'
      +'<div style="display:flex;gap:7px;flex-wrap:wrap">'+badgesHtml(h.badges)+'</div>'
      +'<p style="font-size:14px;line-height:1.7;color:rgba(241,236,225,.72);max-width:640px">'+esc(h.desc)+'</p>'
      +(h.hasNote?'<p style="font-size:12.5px;line-height:1.6;color:rgba(241,236,225,.66);background:rgba(241,236,225,.03);border:1px solid rgba(241,236,225,.09);border-radius:11px;padding:10px 13px"><b style="color:'+A+'">평가 · '+esc(h.verdict)+'</b> '+esc(h.note)+' <span style="opacity:.5;font-family:\'Space Mono\',monospace;font-size:10.5px">— '+esc(h.noteSrc)+'</span></p>':'')
      +'<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:2px"><div style="display:flex;flex-direction:column;gap:3px"><span style="'+h.move.style+'">'+esc(h.move.text)+'<span style="font-family:Pretendard;font-weight:500;font-size:11px;opacity:.8;margin-left:6px">'+esc(h.move.sub)+'</span></span></div>'
      +(h.video?'<button onclick="openVid(\''+jsq(h.video)+'\')" style="'+watchBtn+'">▶ 시청</button>':'')+'</div>'
    +'</div></section></div>';
}
function rowHtml(g){
  return '<div class="rrow" data-screen-label="rank '+g.rankStr+'"><div style="display:flex;align-items:flex-start;gap:clamp(11px,1.7vw,20px)">'
    +'<div class="huebar" style="background:hsl('+g.hue+' 55% 55%)"></div>'
    +'<div class="ranknum">'+g.rankStr+'</div>'
    +'<div class="thumb'+(g.video?'':' novid')+'" onclick="'+(g.video?'openVid(\''+jsq(g.video)+'\')':'')+'">'
      +(g.video?'<img src="'+ytThumb(g.video)+'" onerror="this.onerror=null;this.src=\'https://i.ytimg.com/vi/'+jsq(g.video)+'/hqdefault.jpg\'" loading="lazy" alt="">':'<div class="ph" style="background:linear-gradient(135deg,hsl('+g.hue+' 40% 24%),hsl('+g.hue+' 45% 12%))">'+esc(catWord())+'</div>')
    +'</div>'
    +'<div class="rbody" style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:baseline;gap:9px;flex-wrap:wrap"><b style="font-size:16px;font-weight:700;letter-spacing:-.3px">'+esc(g.name)+'</b><span style="font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:.5px;color:rgba(241,236,225,.34)">'+esc(g.en)+'</span></div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:7px">'+badgesHtml(g.badges)+'</div>'
      +'<div class="oneline">'+esc(g.desc)+'</div>'
      +'<div class="exp"><p style="font-size:13px;line-height:1.6;color:rgba(241,236,225,.76);margin:2px 0 11px">'+esc(g.desc)+'</p>'
        +(g.hasNote?'<p style="font-size:12px;line-height:1.55;color:rgba(241,236,225,.62);background:rgba(241,236,225,.03);border:1px solid rgba(241,236,225,.08);border-radius:9px;padding:8px 10px;margin-bottom:11px"><b style="color:'+A+'">'+esc(g.verdict)+'</b> '+esc(g.note)+'</p>':'')
        +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"><div style="display:flex;gap:6px;flex-wrap:wrap">'+(g.tags||[]).map(function(t){return '<span style="font-family:\'Space Mono\',monospace;font-size:10.5px;letter-spacing:.3px;color:rgba(241,236,225,.55);border:1px solid rgba(241,236,225,.12);padding:3px 9px;border-radius:7px">#'+esc(t)+'</span>';}).join('')+'</div>'
        +(g.video?'<button onclick="openVid(\''+jsq(g.video)+'\')" style="'+watchBtn+'">▶ 시청</button>':'')+'</div></div>'
    +'</div>'
    +'<div class="movecol"><span style="'+g.move.style+'">'+esc(g.move.text)+'</span><div style="font-family:\'Space Mono\',monospace;font-size:9px;letter-spacing:1px;color:rgba(241,236,225,.34);margin-top:6px">'+esc(g.move.sub)+'</div></div>'
  +'</div></div>';
}
function resultsHtml(){
  var cat=CATS[state.cat], raw=cat.items.map(enrich);
  var q=state.query.trim().toLowerCase(), has=q.length>0;
  var filtered=has?raw.filter(function(g){return g.name.toLowerCase().indexOf(q)>=0||String(g.en).toLowerCase().indexOf(q)>=0||(g.tags||[]).some(function(t){return String(t).toLowerCase().indexOf(q)>=0;});}):raw;
  var hero=has?null:decorate(Object.assign({},raw[0]),true);
  if(hero)hero.eyebrow=stripEmoji(cat.label)+' · FEATURED';
  var rowsRaw=has?filtered:raw.slice(1);
  var listTitle=has?'검색 결과':(stripEmoji(cat.label)+' · 이번 주 화제 TOP '+raw.length);
  var showDN=(state.cat==='news');
  var dn=showDN?(stripEmoji(DATANOTE_BASE)+' · '+stripEmoji(EXCL.news||'')):'';
  var listHeader='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin:0 0 18px"><div style="display:flex;align-items:baseline;gap:12px"><span style="width:5px;height:22px;border-radius:5px;background:'+A+';display:inline-block"></span><h3 style="font-size:19px;font-weight:700;letter-spacing:-.3px">'+esc(listTitle)+'</h3><span style="font-family:\'Space Mono\',monospace;font-size:11px;color:rgba(241,236,225,.4)">'+(has?filtered.length:raw.length)+'개</span></div><span style="font-family:\'Space Mono\',monospace;font-size:10.5px;letter-spacing:1px;color:rgba(241,236,225,.38)">지난 순위 대비 ▲▼ 변화</span></div>';
  var rows=rowsRaw.length?rowsRaw.map(function(g0){return rowHtml(decorate(Object.assign({},g0),false));}).join(''):(has?'<div style="padding:52px;text-align:center;color:rgba(241,236,225,.42);border:1px dashed rgba(241,236,225,.13);border-radius:16px">검색 결과가 없어요.</div>':'');
  return (showDN?'<div style="font-size:11.5px;color:rgba(241,236,225,.46);margin:-8px 0 20px;line-height:1.6;max-width:760px">'+dn+'</div>':'')
    +(hero?heroHtml(hero):'')
    +listHeader
    +'<div class="rows" style="display:flex;flex-direction:column;gap:10px">'+rows+'</div>';
}
function footerHtml(){
  return '<footer style="margin-top:44px;padding-top:22px;border-top:1px solid rgba(241,236,225,.08);text-align:center;font-family:\'Space Mono\',monospace;font-size:10.5px;letter-spacing:.5px;color:rgba(241,236,225,.32);line-height:1.9">ddeuzm · 이번 주 화제성 기반 랭킹 — 순위 변화는 직전 집계 대비<br>영상·썸네일은 원본 플랫폼 공식 임베드/링크(자체 저장 없음) · 갱신 주기는 주제마다 다름</footer>';
}
function renderLightbox(){
  var el=document.getElementById('ddz-lb');
  if(!state.videoId){el.innerHTML='';return;}
  el.innerHTML='<div onclick="closeVid()" style="position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:24px"><span onclick="closeVid()" style="position:absolute;top:16px;right:24px;color:#fff;font-size:30px;cursor:pointer;opacity:.85">✕</span><div onclick="event.stopPropagation()" style="width:100%;max-width:960px"><div style="position:relative;padding-top:56.25%"><iframe src="https://www.youtube.com/embed/'+state.videoId+'?autoplay=1&rel=0" title="영상" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border:0;border-radius:14px"></iframe></div></div></div>';
}
function render(){
  document.getElementById('app').innerHTML=headerHtml()+breakingHtml()
    +'<div style="height:1px;background:rgba(241,236,225,.09);margin-bottom:22px"></div>'
    +navHtml()+controlsHtml()
    +'<div id="ddz-results">'+resultsHtml()+'</div>'+footerHtml();
  renderLightbox();
}

/* ---- handlers (global) ---- */
function setCat(k){state.cat=k;state.query='';render();}
function gotoBrk(k){if(!k)return;if(ORDER.indexOf(k)>=MORESTART)state.moreOpen=true;state.cat=k;state.query='';render();}
function toggleMore(){state.moreOpen=!state.moreOpen;render();}
function onSearch(v){state.query=v;document.getElementById('ddz-results').innerHTML=resultsHtml();var c=document.getElementById('ddz-clear');if(c)c.style.display=(v&&v.trim())?'flex':'none';}
function clearSearch(){state.query='';var el=document.getElementById('ddz-search');if(el)el.value='';document.getElementById('ddz-results').innerHTML=resultsHtml();var c=document.getElementById('ddz-clear');if(c)c.style.display='none';}
function brkScroll(dir){var r=document.getElementById('ddz-brk');if(r)r.scrollBy({left:dir*Math.max(240,r.clientWidth*0.8),behavior:'smooth'});}
function openVid(id){if(id){state.videoId=id;renderLightbox();}}
function closeVid(){state.videoId=null;renderLightbox();}
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&state.videoId)closeVid();});
// 행(칸) 탭 → 펼침/접힘 (썸네일·버튼은 자기 동작=영상재생이라 제외)
document.addEventListener('click',function(e){
  if(e.target.closest('.thumb')||e.target.closest('button')||e.target.closest('a'))return;
  var row=e.target.closest('.rrow');
  if(row)row.classList.toggle('expanded');
});

render();
</script>
</body>
</html>
